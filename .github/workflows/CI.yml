name: HireOps Build & Test
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install native build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libffi-dev ffmpeg
          sudo rm -rf /var/lib/apt/lists/*

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: hireops/backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir fastapi 'uvicorn[standard]' sqlalchemy asyncpg alembic
          pip install --no-cache-dir python-jose[cryptography] 'passlib[bcrypt,argon2]' 'bcrypt==3.2.2' python-multipart 'pydantic[email]'
          pip install --no-cache-dir celery redis pdfplumber httpx opencv-python-headless numpy
          pip install --no-cache-dir openai 'livekit-api<1.0' 'livekit-agents<1.0' 'livekit-plugins-openai<1.0' 'livekit-plugins-silero<1.0'
          pip install --no-cache-dir faster-whisper edge-tts
          pip install --no-cache-dir pytest pytest-cov


      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: hireops/frontend
        run: npm install

      # - name: Lint frontend
      #   working-directory: hireops/frontend
      #   run: npm run lint

      # - name: Build frontend
      #   working-directory: hireops/frontend
      #   run: npm run build

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: hireops/backend/coverage.xml