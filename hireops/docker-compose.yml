version: "3.9"

services:

  # 1. Redis Event Mesh for Celery Queue & WebSocket Pub/Sub Isolation
  redis:
    image: redis:7-alpine
    container_name: hireops_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. PostgreSQL Database (Local Development)
  db:
    image: postgres:15-alpine
    container_name: hireops_db
    restart: always
    environment:
      - POSTGRES_USER=hireops_user
      - POSTGRES_PASSWORD=hireops_pass
      - POSTGRES_DB=hireops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireops_user -d hireops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: hireops_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@hireops.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # 4. FastAPI REST / WebSocket Gateway
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_api
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NODE_ENV=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app 
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 5. Celery Base Processing Node (Resume NLP / Bulk Invites)
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_celery_worker
    restart: always
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NODE_ENV=development
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4

  # 6. LiveKit AI Voice Agent Worker
  ai_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_ai_worker
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NODE_ENV=development
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: python agent.py start

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:
