version: "3.9"

services:

  # 1. Redis Event Mesh for Celery Queue & WebSocket Pub/Sub Isolation
  redis:
    image: redis:7-alpine
    container_name: hireops_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. FastAPI REST / WebSocket Gateway
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_api
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app 
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 3. Celery Base Processing Node (Resume NLP / Bulk Invites)
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_celery_worker
    restart: always
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4

  # 4. LiveKit AI Voice Agent Worker
  ai_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops_ai_worker
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: python agent.py start

volumes:
  redis_data:
